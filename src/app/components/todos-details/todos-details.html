@if (todo) {
  <div>
    <h5 class="text-center">{{ title }}</h5>
    <img width="100" height="200" class="img-fluid mx-auto d-block mb-3" [src]="imgSrc" alt="" />
    <div class="container">
      <form (ngSubmit)="updateTod()" #form2="ngForm">
        <input
          type="text"
          class="form-control"
          id="todoTitle"
          name="todoTitle"
          #input="ngModel"
          [placeholder]="todo.title"
          [(ngModel)]="todo.title"
        />
        <input type="checkbox" id="isCompleted" name="isCompleted" [(ngModel)]="todo.isCompleted" />
        <button class="btn btn-secondary" type="submit">Submit</button>
      </form>
      <button class="btn btn-primary" [routerLink]="['/todos']">Back to All Todos</button>
    </div>
  </div>
}

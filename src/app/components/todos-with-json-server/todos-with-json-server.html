    <div class="row my-5">
      <div class="col-sm-12">
        <table class="table table-striped table-dark">
          <thead>
            <tr>
              <th>Item</th>
              <th>Edit</th>
              <th>Remove</th>
            </tr>
          </thead>
          <tbody>
            @for (todo of todos; track $index) {
              <tr>
                <td>{{ todo.title }}</td>
                <td>
                  <button class="btn btn-warning">Edit</button>
                </td>
                <td><button class="btn btn-danger">Remove</button></td>
              </tr>
            } @empty {
              <tr>
                <td><p>Ther is No Task yet !!!</p></td>
              </tr>
            }
          </tbody>
        </table>
      </div>
    </div>
  </div>
